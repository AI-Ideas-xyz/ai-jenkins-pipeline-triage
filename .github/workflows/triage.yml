name: Pipeline Triage Agent

on:
  repository_dispatch:
    types: [pipeline-failure]

permissions:
  contents: read
  models: read
  issues: write

jobs:
  triage:
    name: Analyze failure and notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run triage agent
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          EVENT_PAYLOAD:     ${{ toJson(github.event.client_payload) }}
          ACTIONS_RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python triage_agent.py
