name: Pipeline Triage Agent

on:
  repository_dispatch:
    types: [pipeline-failure]
  workflow_dispatch:
    inputs:
      gist_raw_url:
        description: "Raw Gist URL of the failure log"
        required: true
      category:
        description: "Failure category (playwright-e2e or eks-deploy)"
        default: "eks-deploy"
      job:
        description: "Job name"
        default: "manual-trigger"

permissions:
  contents: read
  models: read
  issues: write

jobs:
  triage:
    name: Analyze failure and notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run triage agent
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          ACTIONS_RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_PAYLOAD: >-
            ${{
              github.event_name == 'workflow_dispatch'
              && format('{{"gist_raw_url":"{0}","category":"{1}","job":"{2}","branch":"{3}","commit":"{4}"}}',
                  github.event.inputs.gist_raw_url,
                  github.event.inputs.category,
                  github.event.inputs.job,
                  github.ref_name,
                  github.sha)
              || toJson(github.event.client_payload)
            }}
        run: python triage_agent.py
